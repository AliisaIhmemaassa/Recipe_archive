<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar" id="page-topbar">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
    <button class="lang-btn" id="lang-btn" onclick="changeLanguage()"></button>
  </div>

  <div id="lock-screen" class="lock-screen">
    <div id="lock-box" class="lock-box">
      <h2>Varauskalenteri</h2>
      <p>Anna salasana jatkaaksesi</p>
      <input type="email" id="email-input" placeholder="Email">
      <input type="password" id="lock-input" placeholder="Salasana">
      <button id="lock-btn" class="lock-btn" onclick="unlock()">Kirjaudu sisään</button>
      <div id="lock-error" class="lock-error">Väärä salasana, yritä uudelleen.</div>
    </div>
  </div> <!-- lock screen end -->

  <div class="app" id="app" style="display: none;">

    <div class="browse-tab" id="browse-tab">
      <div id="browse-search"></div>
      <div id="browse-pills"></div>
      <div id="browse-results"></div>
    </div>

    <div class="add-tab" id="add-tab">

    </div>

    <div class="detail-tab" id="detail-tab">

    </div>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
